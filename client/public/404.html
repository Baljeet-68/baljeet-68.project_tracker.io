<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Project Tracker Tool</title>
  <script type="text/javascript">
    // Redirect SPA routes to index.html with path encoded as query param
    // so GitHub Pages doesn't return a real 404 for client-side routes.
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 2).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
      (l.search ? '~q~' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
