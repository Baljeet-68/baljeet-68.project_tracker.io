services:
  - type: web
    name: project-tracker-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 4000
      - key: MODE
        value: local
      - key: BASE_URL
        value: /api
      - key: JWT_SECRET
        generateValue: true
      - key: PUBLIC_APP_ORIGIN
        value: https://baljeet-68.github.io
